<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respire com o Baiacu</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* O Baiacu */
        .pufferfish {
            width: 150px;
            height: 120px;
            background-color: #ffeb3b;
            border-radius: 50%;
            position: relative;
            margin: 0 auto;
            border: 4px solid #fbc02d;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.05);
            /* Animação Principal */
            animation: breathe 8s ease-in-out infinite;
        }

        /* Olhos */
        .eye {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 30%;
            border: 2px solid #333;
        }
        .eye.left { left: 25%; }
        .eye.right { right: 25%; }
        .eye::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        /* Barbatanas */
        .fin {
            width: 30px;
            height: 20px;
            background: #fbc02d;
            position: absolute;
            top: 50%;
            border-radius: 50%;
        }
        .fin.left { left: -25px; transform: rotate(-30deg); }
        .fin.right { right: -25px; transform: rotate(30deg); }

        /* Espinhos (simbolizados por pontinhos) */
        .pufferfish::before {
            content: "⋮⋮⋮";
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #fbc02d;
            font-size: 20px;
        }

        /* Texto de instrução */
        .instruction {
            margin-top: 50px;
            font-size: 1.5rem;
            color: #00796b;
            font-weight: bold;
        }

        /* Keyframes da Respiração */
        @keyframes breathe {
            0%, 100% {
                transform: translateY(50px) scale(1);
                background-color: #fff176;
            }
            50% {
                transform: translateY(-50px) scale(1.8);
                background-color: #ffeb3b;
            }
        }

        .status::after {
            content: "Inspire...";
            animation: textUpdate 8s infinite;
        }

        @keyframes textUpdate {
            0%, 100% { content: "Expire devagar..."; opacity: 0.5; }
            40%, 60% { content: "Inspire profundamente..."; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="pufferfish">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="fin left"></div>
            <div class="fin right"></div>
        </div>
        <div class="instruction status"></div>
    </div>

    <script>
        // Você pode usar JS para mudar a velocidade conforme o usuário se acalma
        const fish = document.querySelector('.pufferfish');
        
        // Exemplo: Tornar a respiração ainda mais lenta após 30 segundos
        setTimeout(() => {
            fish.style.animationDuration = '10s';
            console.log("Ritmo acalmado.");
        }, 30000);
    </script>
</body>
</html>
