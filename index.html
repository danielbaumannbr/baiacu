<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baiacu - Exercício de Respiração</title>
    <style>
        /* Configurações da página inteira */
        body {
            margin: 0; /* Remove as bordas brancas padrão do navegador */
            display: flex; /* Permite usar o alinhamento flexível */
            justify-content: center; /* Centraliza o conteúdo na horizontal */
            align-items: center; /* Centraliza o conteúdo na vertical */
            height: 100vh; /* Faz o fundo ocupar toda a altura da tela */
            background-color: #e0f7fa; /* Cor de fundo azul água clara */
            overflow: hidden; /* Impede que apareçam barras de rolagem */
        }

        /* Espaço onde o peixe fica contido */
        .container-do-peixe {
            position: relative;
        }

        /* O corpo principal do Baiacu */
        .baiacu {
            width: 150px; /* Largura do peixe */
            height: 120px; /* Altura do peixe */
            background-color: #ffeb3b; /* Cor amarela vibrante */
            border-radius: 50%; /* Faz o formato ficar oval/arredondado */
            position: relative; /* Base para posicionar olhos e barbatanas dentro dele */
            border: 4px solid #fbc02d; /* Contorno um pouco mais escuro */
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.05); /* Sombra interna para dar volume */
            
            /* Ativa a animação chamada 'respirar' com duração de 8 segundos e repetição infinita */
            animation: respirar 8s ease-in-out infinite;
        }

        /* Estilo base para os dois olhos */
        .olho {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute; /* Permite mover o olho livremente sobre o corpo */
            top: 30%; /* Altura dos olhos em relação ao topo do corpo */
            border: 2px solid #333; /* Contorno preto fino nos olhos */
        }

        /* Posição do olho da esquerda */
        .olho.esquerdo { left: 25%; }
        /* Posição do olho da direita */
        .olho.direito { right: 25%; }
        
        /* A pupila (pontinho preto) dentro de cada olho */
        .olho::after {
            content: ''; /* Necessário para que o elemento apareça */
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        /* Estilo das barbatanas laterais */
        .barbatana {
            width: 30px;
            height: 20px;
            background: #fbc02d;
            position: absolute;
            top: 50%;
            border-radius: 50%;
        }

        /* Posiciona e inclina a barbatana esquerda */
        .barbatana.esquerda { left: -25px; transform: rotate(-30deg); }
        /* Posiciona e inclina a barbatana direita */
        .barbatana.direita { right: -25px; transform: rotate(30deg); }

        /* Pequenos detalhes que lembram espinhos na barriga */
        .baiacu::before {
            content: "⋮⋮⋮";
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%); /* Centraliza os pontinhos */
            color: #fbc02d;
            font-size: 22px;
            opacity: 0.7;
        }

        /* Definição dos movimentos da animação */
        @keyframes respirar {
            /* No início (0%) e no fim (100%): peixe embaixo e tamanho normal */
            0%, 100% {
                transform: translateY(60px) scale(1);
                background-color: #fff176;
            }
            /* No meio do tempo (50%): peixe sobe e infla 1.8 vezes (quase o dobro) */
            50% {
                transform: translateY(-60px) scale(1.8);
                background-color: #ffeb3b;
            }
        }
    </style>
</head>
<body>

    <div class="container-do-peixe">
        <div class="baiacu">
            <div class="olho esquerdo"></div>
            <div class="olho direito"></div>
            <div class="barbatana esquerda"></div>
            <div class="barbatana direita"></div>
        </div>
    </div>

</body>
</html>
