<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baiacu - Respiração Visual</title>
    <style>
        /* Centralização total da tela */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0f7fa;
            overflow: hidden;
        }

        .container {
            position: relative;
        }

        /* O Corpo do Baiacu */
        .pufferfish {
            width: 150px;
            height: 120px;
            background-color: #ffeb3b;
            border-radius: 50%;
            position: relative;
            border: 4px solid #fbc02d;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.05);
            
            /* Animação: Sobe/Infla e Desce/Esvazia */
            animation: breathe 8s ease-in-out infinite;
        }

        /* Olhos */
        .eye {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 30%;
            border: 2px solid #333;
        }
        .eye.left { left: 25%; }
        .eye.right { right: 25%; }
        
        .eye::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        /* Barbatanas Laterais */
        .fin {
            width: 30px;
            height: 20px;
            background: #fbc02d;
            position: absolute;
            top: 50%;
            border-radius: 50%;
        }
        .fin.left { left: -25px; transform: rotate(-30deg); }
        .fin.right { right: -25px; transform: rotate(30deg); }

        /* Detalhes de Textura (Espinhos) */
        .pufferfish::before {
            content: "⋮⋮⋮";
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #fbc02d;
            font-size: 22px;
            opacity: 0.7;
        }

        /* Animação Fluida */
        @keyframes breathe {
            0%, 100% {
                transform: translateY(60px) scale(1);
                background-color: #fff176;
            }
            50% {
                transform: translateY(-60px) scale(1.8);
                background-color: #ffeb3b;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="pufferfish">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="fin left"></div>
            <div class="fin right"></div>
        </div>
    </div>

</body>
</html>
